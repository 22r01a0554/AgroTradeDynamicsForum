<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        const form=$("#loginform");
        $(document).ready(function(){
            $("#loginform").submit(()=>{
                event.preventDefault();
                var name=$("#username").val();
                var password=$("#pwd").val();
                //generateToken by making a service call to /auth with post
                $.ajax({
                    url:"/auth",
                    type:"POST",
                    contentType:"application/json",
                    dataType:"json",
                    data:JSON.stringify({
                        name:name,
                        password:password
                    }),
                    success:function(data){
                        var tokenData=data;
                        if(tokenData.login==true){
                            localStorage.setItem("username",tokenData.data.name);
                            localStorage.setItem("email",tokenData.data.email);
                            if(verifyLogin(tokenData.token))
                            {  
                                window.location.href="/welcome";
                            }
                        else{
                            alert("Authentication Failed");
                        }
                        }
                    },
                    error: function(data ){
                        console.log("Something went wrong");
                    }
                    });
            
            })
          
        });
        function verifyLogin(token)
    {
        let result=true;
        //verifyToken by making a service call to /verifyToken with get
        $.ajax({
        url:"/verifyToken",
        type:"POST",
        contentType:"application/json",
        dataType:"json",
        data: JSON.stringify({
        token: token}),
        success: function(data) {
            if(data.login==true)
            {     
                result=true;
            }
            else
            {
                result=false;
            }
        },
        error: function(data ){
            console.log("Wrong Token, Not Authenticated.");
        }
        });
        return result;
    }
    </script>
</head>
<body>
    <div class="login">
        <h3>Login</h3>
        <form  id="loginform">
            <div class="li">
            <label for="username">Enter Username</label>
            <input type="text" placeholder="ex:Lavanya@5809" name="username" id="username">
            <label for="password">Enter Password</label>
            <input type="password" placeholder="password" name="pwd" id="pwd">
            <button id="blogin">Login</button>
            <h3>No Account
                <a href="/signup.html">Create One</h3>
            </div>
        </form>
    </div>
</body>
<style>
    .login{
        border:2px solid rgb(68, 227, 68);
        padding: 20px 60px 20px 40px;
        width: 300px;
        height:350px;
        text-align:center;
        padding:10px 5px;
        text-transform:uppercase;
        
    }
    .li{
        margin:20px 10px; 
        position:relative;
        
    }
    .li input{
        display:block;
        width: 260px;
        padding:10px 10px;
        margin-bottom:5px;
    }
    .li label{
        display: inline-block;
        padding:10px 10px;
        margin-bottom:5px;
    }
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        padding:100px;
    }
    button {
        position: relative;
       
        transition: .4s ease-in;
        margin-top: 10px;
        width: 100px;
        height: 40px;
    }
    
</style>
</html>
